# Dependabot keeps two things fresh:
#   - github-actions: the SHA-pinned actions in .github/workflows (it bumps the pinned commit SHA
#     and the trailing version comment together)
#   - uv: the Python dependencies in pyproject.toml / uv.lock
#
# Both run weekly. Minor and patch bumps are grouped into one PR per ecosystem; major bumps arrive
# as individual PRs so breaking changes get their own review.
# The cooldown holds version bumps for a few days so a freshly published (or
# compromised-then-yanked) release is not pulled in on day zero. Cooldown never applies to security
# updates, which still open immediately.
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      # Runtime deps: group safe bumps, let majors come through one at a time.
      python-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Dev/test tooling (ruff, zuban, pytest, ...): group all bumps together.
      python-development:
        dependency-type: "development"
