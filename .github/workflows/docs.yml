# Build the Zensical documentation site (docs/ + zensical.toml) and publish it to GitHub Pages
# at https://jbsilva.github.io/photo-tagger/.
#
# Runs on pushes to main that touch the docs sources, or manually from the Actions tab.
name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# One deployment at a time; do not cancel a deploy that is already in flight.
concurrency:
  group: docs-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build site
        # --only-group docs: the docs build needs zensical only, not the app's dependencies.
        run: uv run --only-group docs --locked --no-build zensical build --clean

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
