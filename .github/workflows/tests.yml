name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        # NOSONAR S8541,S8544 - uv sync reads uv.lock (committed); --no-build is a dotnet flag.
        run: uv sync --group test

      - name: Run tests
        # NOSONAR S8541,S8544 - uv run uses the locked env from uv.lock; --no-build is dotnet-only.
        run: uv run pytest
