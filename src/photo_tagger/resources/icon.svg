<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Photo Tagger">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)"/>
  <!-- camera body with viewfinder bump -->
  <path d="M232 396 h118 l38 -54 h248 l38 54 h118 a58 58 0 0 1 58 58 v246 a58 58 0 0 1 -58 58
           H232 a58 58 0 0 1 -58 -58 V454 a58 58 0 0 1 58 -58 z" fill="#FFFFFF"/>
  <!-- lens -->
  <circle cx="512" cy="574" r="152" fill="url(#lens)"/>
  <circle cx="512" cy="574" r="98" fill="#FFFFFF"/>
  <circle cx="512" cy="574" r="60" fill="#A5B4FC"/>
  <circle cx="468" cy="528" r="22" fill="#FFFFFF" opacity="0.85"/>
  <!-- shutter / status light -->
  <circle cx="748" cy="452" r="22" fill="#8B5CF6"/>
  <!-- keyword tag emblem -->
  <g transform="translate(596 250) rotate(38)">
    <path d="M0 36 a36 36 0 0 1 36 -36 h84 a36 36 0 0 1 36 36 v84 a36 36 0 0 1 -10.5 25.5
             l-104 104 a30 30 0 0 1 -42 0 l-84 -84 a30 30 0 0 1 0 -42 z" fill="#22D3EE"/>
    <circle cx="78" cy="42" r="20" fill="#0E7490"/>
  </g>
</svg>
